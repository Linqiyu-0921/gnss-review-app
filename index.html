<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNSS 考试刷题</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- 顶部：模式 + 题型 + 数据 -->
  <header class="topbar">
    <div class="mode-tabs">
      <button class="mode-tab active" data-appmode="practice">刷题</button>
      <button class="mode-tab" data-appmode="memorize">背题</button>
    </div>
    <div id="practice-controls" class="inner-tabs">
      <button class="inner-tab active" data-mode="all">全部</button>
      <button class="inner-tab" data-mode="choice">选择</button>
      <button class="inner-tab" data-mode="fill">填空</button>
      <button class="inner-tab" data-mode="flash">闪卡</button>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-num" id="stat-done">0</span><span class="stat-label">已答</span></div>
      <div class="stat good"><span class="stat-num" id="stat-right">0</span><span class="stat-label">正确</span></div>
      <div class="stat bad"><span class="stat-num" id="stat-wrong">0</span><span class="stat-label">错误</span></div>
      <div class="stat starred"><span class="stat-num" id="stat-star">0</span><span class="stat-label">已标</span></div>
    </div>
  </header>

  <!-- 工具栏：章节过滤 + 操作 -->
  <div id="practice-toolbar" class="toolbar">
    <select id="chapter-filter" class="select"></select>
    <button id="btn-shuffle" class="btn btn-ghost" title="乱序">🔀</button>
    <button id="btn-mark" class="btn btn-ghost" title="标记本题">⭐</button>
    <button id="btn-show-answer" class="btn btn-ghost" title="显示答案">👁</button>
    <button id="btn-only-wrong" class="btn btn-ghost btn-toggle" title="只看错题/标记">错题</button>
    <span class="progress-text"><span id="progress-current">1</span> / <span id="progress-total">0</span></span>
  </div>

  <!-- 背题模式工具栏 -->
  <div id="memorize-toolbar" class="toolbar" style="display:none">
    <select id="mem-chapter" class="select"></select>
    <select id="mem-type" class="select" style="max-width:120px">
      <option value="all">全部题型</option>
      <option value="choice">选择题</option>
      <option value="fill">填空题</option>
      <option value="flash">闪卡</option>
    </select>
    <select id="mem-speed" class="select" style="max-width:130px" title="自动翻页间隔">
      <option value="0">手动翻页</option>
      <option value="5">每题 5 秒</option>
      <option value="8" selected>每题 8 秒</option>
      <option value="12">每题 12 秒</option>
      <option value="20">每题 20 秒</option>
    </select>
    <button id="mem-shuffle" class="btn btn-ghost" title="乱序">🔀</button>
    <span class="progress-text"><span id="mem-current">1</span> / <span id="mem-total">0</span></span>
  </div>

  <!-- 主体：题目区 -->
  <main class="main" id="main-content">
    <!-- 题目由 JS 渲染 -->
  </main>

  <!-- 底部：答题操作 -->
  <div class="bottom-bar" id="bottom-bar">
    <!-- 由 JS 动态注入 -->
  </div>

  <!-- 侧边栏：错题本 / 章节正确率 -->
  <button class="side-btn" id="side-toggle">📋</button>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>复习看板</h3>
      <button class="side-close" id="side-close">×</button>
    </div>
    <div class="sidebar-body">
      <div class="panel">
        <h4>章节正确率</h4>
        <div class="chapter-bars" id="chapter-bars"></div>
      </div>
      <div class="panel">
        <h4>错题本（<span id="wrong-count">0</span>）</h4>
        <div class="wrong-list" id="wrong-list"></div>
      </div>
      <div class="panel">
        <h4>已标记（<span id="star-count">0</span>）</h4>
        <div class="star-list" id="star-list"></div>
      </div>
      <div class="panel">
        <h4>题目类型分布</h4>
        <div class="type-stats" id="type-stats"></div>
      </div>
      <div class="panel">
        <button class="btn btn-danger" id="btn-reset">重置所有数据</button>
      </div>
    </div>
  </aside>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
